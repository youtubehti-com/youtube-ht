<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحريك الشفاه الذكي - Lip Sync</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            position: relative;
            margin: 0 auto;
            width: 100%;
            max-width: 640px;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            border-radius: 10px;
            transform: scaleX(-1); /* لعمل تأثير المرآة الكاميرا */
        }
        canvas {
            z-index: 2;
        }
        video {
            opacity: 0.3; /* جعل الفيديو شفاف للتركيز على الرسم */
            z-index: 1;
        }
        button {
            background-color: #ff3b30;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #status {
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>محاكاة تحريك الشفاه مع الصوت (Lip Sync)</h1>
    <button id="startBtn">تشغيل الكاميرا والمايكروفون</button>
    <div id="status">جاري تحميل موديل الذكاء الاصطناعي...</div>

    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');

        let faceLandmarker;
        let audioContext;
        let analyser;
        let dataArray;
        let runningMode = "VIDEO";

        // 1. تحميل موديل كشف ملامح الوجه من قوقل
        async function initializeFaceLandmarker() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker_gpu/float16/1/face_landmarker_gpu.task`,
                    delegate: "GPU"
                },
                outputFaceBlendshapes: true,
                runningMode: runningMode,
                numFaces: 1
            });
            statusDiv.innerText = "الموديل جاهز! اضغط على الزر للبدء.";
        }
        initializeFaceLandmarker();

        // 2. إعداد الصوت والكاميرا عند الضغط على الزر
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 }, 
                    audio: true 
                });
                
                video.srcObject = stream;
                video.addEventListener('loadeddata', predictWebcam);
                
                // إعداد تحليل الصوت الحقيقي (Web Audio API)
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                startBtn.style.display = 'none';
                statusDiv.innerText = "تحدث الآن وشاهد حركة الفم!";
            } catch (err) {
                alert("خطأ في الوصول للكاميرا أو المايك: " + err);
            }
        });

        // 3. حلقة التتبع والرسم المستمر
        let lastVideoTime = -1;
        async function predictWebcam() {
            // ضبط أبعاد الـ Canvas لتطابق الفيديو
            if (canvas.width !== video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, startTimeMs);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // حساب شدة الصوت الحالية
                let audioIntensity = 0;
                if (analyser) {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        sum += dataArray[i];
                    }
                    // استخراج القيمة المتوسطة وتكبيرها لتتناسب مع الرسم
                    audioIntensity = (sum / dataArray.length) * 0.4; 
                }

                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    
                    // رسم نقاط الوجه والتركيز على الفم
                    // نقاط الشفاه في MediaPipe تختلف أرقامها عن Dlib
                    // الشفة العليا الداخلية والخارجية والشفة السفلى
                    
                    ctx.fillStyle = "#00ff00";
                    ctx.strokeStyle = "#00ff00";
                    ctx.lineWidth = 2;

                    // رسم نص السيناريو على الشاشة كـ Hook
                    ctx.save();
                    ctx.scale(-1, 1); // عكس النص لكي يظهر صحيحاً مع الـ Mirror
                    ctx.font = "18px Arial";
                    ctx.fillStyle = "white";
                    ctx.fillText("In this world, if you keep a secret... its weight will burn you.", -canvas.width + 20, 40);
                    ctx.restore();

                    // تحديد ملامح الشفاه الخارجية (تقابل النطاق 48-60 في dlib)
                    // في MediaPipe الشفة الخارجية تبدأ من مؤشرات معينة، سنقوم برسم الفم تفاعلياً:
                    const outerLipIndices = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 415, 310, 311, 312, 13, 82, 81, 80, 191, 78];
                    
                    ctx.beginPath();
                    outerLipIndices.forEach((index, i) => {
                        let pt = landmarks[index];
                        let x = pt.x * canvas.width;
                        let y = pt.y * canvas.height;
                        
                        // إضافة تأثير الصوت: إذا كانت النقطة في الشفة السفلية، نقوم بإنزالها لأسفل بناءً على الصوت
                        if (index === 146 || index === 91 || index === 181 || index === 84 || index === 17 || index === 314 || index === 405 || index === 321) {
                            y += audioIntensity; // تحريك لأسفل مع شدة الصوت
                        }

                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    });
                    ctx.closePath();
                    ctx.stroke();

                    // رسم نقاط حمراء تفاعلية داخل الفم
                    const innerLipIndices = [78, 95, 88, 178, 87, 14, 317, 402, 318, 324, 308, 415, 310, 311, 312, 13, 82, 81, 80, 191];
                    innerLipIndices.forEach(index => {
                        let pt = landmarks[index];
                        let x = pt.x * canvas.width;
                        let y = pt.y * canvas.height;
                        
                        // إضافة نفس تأثير الصوت للشفة الداخلية السفلى
                        if (index === 95 || index === 88 || index === 178 || index === 87 || index === 14 || index === 317 || index === 402 || index === 318) {
                            y += audioIntensity;
                        }

                        ctx.beginPath();
                        ctx.arc(x, y, 3, 0, 2 * Math.PI);
                        ctx.fillStyle = "#ff003c";
                        ctx.fill();
                    });
                }
            }
            // استدعاء الإطار التالي
            requestAnimationFrame(predictWebcam);
        }
    </script>
</body>
</html>
